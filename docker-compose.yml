services:
  trader:
    build: .
    image: ai-futures-trader:latest
    container_name: ai-futures-trader
    restart: unless-stopped

    working_dir: /app

    env_file:
      - .env

    volumes:
      - ./data:/app/data

    tty: true
    stdin_open: true

    environment:
      - TZ=UTC
      - DASHBOARD=0

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f main.py || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s